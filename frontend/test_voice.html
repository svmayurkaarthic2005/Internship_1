<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Recording Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
        }
        .recording {
            background: red;
            color: white;
        }
        #log {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-bottom: 1px solid #ddd;
        }
        .error { color: red; }
        .success { color: green; }
        .info { color: blue; }
    </style>
</head>
<body>
    <h1>🎤 Voice Recording Test</h1>
    
    <div>
        <h3>Step 1: Test Browser Support</h3>
        <button onclick="checkSupport()">Check Browser Support</button>
    </div>
    
    <div>
        <h3>Step 2: Test Recording</h3>
        <button id="recordBtn" onclick="toggleRecording()">Start Recording</button>
        <span id="timer"></span>
    </div>
    
    <div>
        <h3>Step 3: Test Backend Connection</h3>
        <button onclick="checkBackend()">Check Backend Health</button>
    </div>
    
    <div>
        <h3>Authentication Token</h3>
        <input type="text" id="tokenInput" placeholder="Paste JWT token here" style="width: 100%; padding: 10px;">
        <small>Get this from browser storage or network tab after logging in</small>
    </div>
    
    <div id="log">
        <div class="log-entry">Test log will appear here...</div>
    </div>
    
    <script src="js/voiceRecorder.js"></script>
    <script src="js/speechAPI.js"></script>
    <script>
        let recorder = null;
        let isRecording = false;
        let lastAudioBlob = null;
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }
        
        function checkSupport() {
            log('Checking browser support...', 'info');
            
            if (!navigator.mediaDevices) {
                log('❌ navigator.mediaDevices not available', 'error');
                return;
            }
            log('✓ navigator.mediaDevices available', 'success');
            
            if (!navigator.mediaDevices.getUserMedia) {
                log('❌ getUserMedia not available', 'error');
                return;
            }
            log('✓ getUserMedia available', 'success');
            
            if (!window.MediaRecorder) {
                log('❌ MediaRecorder not available', 'error');
                return;
            }
            log('✓ MediaRecorder available', 'success');
            
            // Check supported MIME types
            const types = [
                'audio/webm;codecs=opus',
                'audio/webm',
                'audio/ogg;codecs=opus',
                'audio/ogg',
                'audio/wav'
            ];
            
            log('Checking supported audio formats:', 'info');
            types.forEach(type => {
                const supported = MediaRecorder.isTypeSupported(type);
                log(`  ${supported ? '✓' : '✗'} ${type}`, supported ? 'success' : 'error');
            });
        }
        
        async function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                await startRecording();
            }
        }
        
        async function startRecording() {
            try {
                log('Initializing voice recorder...', 'info');
                
                if (!recorder) {
                    recorder = new VoiceRecorder();
                    recorder.onStart = () => {
                        log('✓ Recording started', 'success');
                        document.getElementById('recordBtn').textContent = 'Stop Recording';
                        document.getElementById('recordBtn').className = 'recording';
                    };
                    recorder.onStop = (audioBlob, duration) => {
                        log(`✓ Recording stopped (${duration}ms)`, 'success');
                        log(`  Blob size: ${audioBlob.size} bytes`, 'info');
                        log(`  Blob type: ${audioBlob.type}`, 'info');
                        lastAudioBlob = audioBlob;
                        document.getElementById('recordBtn').textContent = 'Start Recording';
                        document.getElementById('recordBtn').className = '';
                        
                        // Auto-test transcription
                        const token = document.getElementById('tokenInput').value;
                        if (token) {
                            testTranscription(audioBlob, token);
                        } else {
                            log('⚠️  No token provided. Enter token and try again.', 'error');
                        }
                    };
                    recorder.onError = (error) => {
                        log(`❌ Recording error: ${error.message}`, 'error');
                    };
                    recorder.onTimer = (seconds) => {
                        document.getElementById('timer').textContent = `${seconds}s`;
                    };
                }
                
                await recorder.startRecording();
                isRecording = true;
                
            } catch (error) {
                log(`❌ Failed to start recording: ${error.message}`, 'error');
                isRecording = false;
            }
        }
        
        function stopRecording() {
            if (recorder) {
                recorder.stopRecording();
                isRecording = false;
                document.getElementById('timer').textContent = '';
            }
        }
        
        async function checkBackend() {
            log('Checking backend health...', 'info');
            
            try {
                const api = new SpeechAPI();
                const health = await api.checkHealth();
                
                log(`Backend status: ${health.status}`, health.status === 'ready' ? 'success' : 'error');
                if (health.model) {
                    log(`  Model: ${health.model}`, 'info');
                }
                if (health.message) {
                    log(`  Message: ${health.message}`, 'info');
                }
                
            } catch (error) {
                log(`❌ Backend check failed: ${error.message}`, 'error');
            }
        }
        
        async function testTranscription(audioBlob, token) {
            log('Testing transcription...', 'info');
            
            try {
                const api = new SpeechAPI();
                log(`  Sending ${audioBlob.size} bytes to backend...`, 'info');
                
                const result = await api.transcribe(audioBlob, token);
                
                log(`✓ Transcription successful!`, 'success');
                log(`  Text: "${result.text}"`, 'success');
                log(`  Language: ${result.language}`, 'info');
                log(`  Confidence: ${(result.languageProbability * 100).toFixed(1)}%`, 'info');
                
            } catch (error) {
                log(`❌ Transcription failed: ${error.message}`, 'error');
            }
        }
        
        // Auto-check support on load
        window.onload = () => {
            checkSupport();
            
            // Try to get token from localStorage
            try {
                const stored = localStorage.getItem('officer_data');
                if (stored) {
                    const data = JSON.parse(stored);
                    if (data.access_token) {
                        document.getElementById('tokenInput').value = data.access_token;
                        log('✓ Token loaded from localStorage', 'success');
                    }
                }
            } catch (e) {
                log('No stored token found', 'info');
            }
        };
    </script>
</body>
</html>
