<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIS Officer Portal - Tamil Nadu</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Stylesheets - Modular CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="login-page">
    <div class="login-container-new">
        <div class="login-card-new">
            <div class="card-header-new">
                <div class="card-icon-new">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#1B4D9B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user-round-cog"><path d="M2 21a8 8 0 0 1 10.434-7.62"/><circle cx="10" cy="8" r="5"/><circle cx="18" cy="18" r="3"/><path d="m19.5 14.3-.4.9"/><path d="m16.9 20.8-.4.9"/><path d="m21.7 19.5-.9-.4"/><path d="m15.2 16.9-.9-.4"/><path d="m21.7 16.5-.9.4"/><path d="m15.2 19.1-.9.4"/><path d="m19.5 21.7-.4-.9"/><path d="m16.9 15.2-.4-.9"/></svg>
                </div>
                <h1 class="card-title-new">Sub Inspector Surveyor</h1>
                <p class="card-subtitle-new">AI Assistant Portal</p>
                <div class="header-divider-new"></div>
            </div>
            
            <div class="login-form-container-new">
                <h2 class="form-title-new">Sign in to your account</h2>
                <form id="loginForm" class="login-form-new" novalidate>
                    <div class="form-group-new">
                        <label for="email" class="form-label-new">Email ID</label>
                        <div class="input-wrapper-new">
                            <i data-lucide="user" class="input-icon-new"></i>
                            <input type="email" id="email" name="email" class="form-input-new" placeholder="Enter your Email ID" required autocomplete="email">
                        </div>
                    </div>
                    
                    <div class="form-group-new">
                        <label for="password" class="form-label-new">Password</label>
                        <div class="input-wrapper-new">
                            <i data-lucide="lock" class="input-icon-new"></i>
                            <input type="password" id="password" name="password" class="form-input-new" placeholder="Enter your Password" required minlength="6" autocomplete="current-password">
                            <button type="button" class="password-toggle-new" id="togglePassword" aria-label="Toggle password visibility">
                                <i data-lucide="eye-off" class="toggle-icon-new"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="form-options-new">
                        <label class="checkbox-label-new">
                            <input type="checkbox" id="rememberMe" name="rememberMe" class="checkbox-input-new">
                            <span class="checkbox-text-new">Remember me</span>
                        </label>
                    </div>
                    
                    <div class="error-message-new" id="errorMessage" style="display: none;">
                        <i data-lucide="alert-circle" class="error-icon-new"></i>
                        <span id="errorText">Invalid credentials</span>
                    </div>
                    
                    <button type="submit" class="btn-submit-new" id="submitBtn">
                        <i data-lucide="lock" class="btn-icon-new" style="width: 16px; height: 16px; margin-right: 8px;"></i>
                        <span id="btnText">Sign In</span>
                        <div class="spinner-new" id="spinner" style="display: none;"></div>
                    </button>
                </form>
            </div>
        </div>
        <div class="copyright-new">
            <p>&copy; 2024 All Rights Reserved</p>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
